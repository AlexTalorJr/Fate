<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PHASE</title>
<style>
  :root{
    --bg:#04060c; --ink:#e8f4ff; --dim:#5a7494;
    --cyan:#39e6ff; --magenta:#ff4fd8; --amber:#ffc24b; --violet:#9b7bff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);overflow:hidden;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  #wrap{position:relative;width:100vw;height:100vh;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* HUD */
  #hud{position:absolute;inset:0;pointer-events:none;}
  .corner{position:absolute;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
  #scoreWrap{top:18px;left:50%;transform:translateX(-50%);text-align:center;}
  #score{font-size:clamp(34px,7vw,58px);font-weight:200;line-height:1;
    text-shadow:0 0 24px rgba(57,230,255,.35);}
  #lvl{margin-top:4px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.28em;}

  #chainWrap{top:22px;right:20px;text-align:right;opacity:0;transition:opacity .2s;}
  #chainNum{font-size:clamp(20px,4.5vw,30px);font-weight:300;}
  #chainBar{height:3px;margin-top:5px;background:var(--cyan);border-radius:2px;
    transform-origin:right center;box-shadow:0 0 10px var(--cyan);}

  #bestWrap{top:24px;left:20px;font-size:11px;color:var(--dim);
    text-transform:uppercase;letter-spacing:.18em;line-height:1.7;}
  #bestWrap b{color:#8fb4d8;font-weight:500;}

  /* health: thin top bar */
  #hpTrack{position:absolute;top:0;left:0;width:100%;height:3px;background:rgba(120,150,200,.08);}
  #hpFill{height:100%;width:100%;transform-origin:left center;
    background:linear-gradient(90deg,var(--magenta),var(--cyan));
    transition:transform .12s linear, background .3s;}

  /* the always-on instruction */
  #howto{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
    font-size:13px;color:var(--dim);letter-spacing:.05em;text-align:center;
    transition:opacity .4s;}
  #howto b{color:#9fc2e6;font-weight:500;}

  /* center toast (rare events only) */
  #toast{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.7);
    font-size:clamp(40px,11vw,84px);font-weight:200;letter-spacing:.12em;
    opacity:0;pointer-events:none;white-space:nowrap;}

  /* overlays */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(circle at 50% 42%,rgba(8,14,28,.72),rgba(2,4,10,.94));
    pointer-events:auto;}
  .hidden{display:none!important;}
  .title{font-size:clamp(56px,17vw,150px);font-weight:100;letter-spacing:.34em;
    margin-right:-.34em;
    background:linear-gradient(120deg,var(--cyan),var(--violet),var(--magenta));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 40px rgba(57,230,255,.25));}
  .tagline{margin-top:18px;font-size:clamp(15px,3.4vw,19px);color:#9fc2e6;
    letter-spacing:.04em;max-width:30ch;line-height:1.5;}
  .tagline b{color:var(--cyan);font-weight:600;}
  .btn{margin-top:38px;padding:16px 46px;font-size:16px;letter-spacing:.22em;
    font-weight:500;text-transform:uppercase;color:var(--bg);cursor:pointer;
    border:none;border-radius:40px;
    background:linear-gradient(120deg,var(--cyan),#7fd4ff);
    box-shadow:0 0 34px rgba(57,230,255,.5);transition:transform .12s, box-shadow .2s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(57,230,255,.8);}
  .btn:active{transform:translateY(0) scale(.97);}
  .btn.sub{margin-top:14px;padding:11px 30px;font-size:12px;background:none;
    color:var(--dim);box-shadow:none;border:1px solid rgba(90,116,148,.3);}
  .btn.sub:hover{color:var(--ink);transform:none;box-shadow:none;}

  /* end screen specifics */
  #endVerdict{font-size:clamp(38px,10vw,72px);font-weight:200;letter-spacing:.16em;}
  #endScore{font-size:clamp(60px,16vw,120px);font-weight:100;line-height:1;margin:6px 0;
    font-variant-numeric:tabular-nums;}
  #endLine{font-size:14px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;}
  #medal{font-size:46px;margin-bottom:6px;}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="hpTrack"><div id="hpFill"></div></div>
    <div id="scoreWrap" class="corner">
      <div id="score">0</div>
      <div id="lvl">LEVEL 1</div>
    </div>
    <div id="chainWrap" class="corner">
      <div id="chainNum">×1</div>
      <div id="chainBar"></div>
    </div>
    <div id="bestWrap" class="corner">BEST <b id="best">0</b></div>
    <div id="howto"><b>Жми</b>, когда кольцо касается точки</div>
  </div>
  <div id="toast"></div>

  <!-- START -->
  <div id="startScreen" class="screen">
    <div class="title">PHASE</div>
    <div class="tagline">Из центра расходится кольцо. Лови точку <b>в тот миг</b>, когда кольцо её касается.</div>
    <button id="startBtn" class="btn">Играть</button>
    <button id="skipBtn" class="btn sub">Пропустить обучение</button>
  </div>

  <!-- END -->
  <div id="endScreen" class="screen hidden">
    <div id="medal"></div>
    <div id="endVerdict"></div>
    <div id="endScore">0</div>
    <div id="endLine"></div>
    <button id="againBtn" class="btn">Ещё раз</button>
  </div>
</div>

<script>
/* ============================================================
   PHASE — v6 radial phase-lock.  One ring, ≤3 nodes, no clutter.
   Pure logic lives in PhaseCore (DOM-free, unit-tested in regress).
   ============================================================ */
"use strict";
var PhaseCore = (function(){
  var CFG = {
    RMIN:0,            // ring starts at center
    RPAD:30,           // node ring sits this far inside the edge
    BEAT:1.05, BEAT_FLOOR:0.62, BEAT_STEP:0.035,   // seconds per ring pass
    WINDOW:28, WINDOW_FLOOR:15, WINDOW_STEP:0.9,    // px tolerance |r - nodeR|
    CRIT_FRAC:0.34,    // inner fraction of window that counts as PERFECT
    NODE_R:16,
    GRACE:0.16,
    NODE_LIFE:5.4, NODE_LIFE_FLOOR:2.9,             // seconds before a node decoheres
    SPAWN:1.55, SPAWN_FLOOR:0.78,                   // seconds between spawn attempts
    MAX_NODES:3,                                    // HARD cap — anti-cacophony
    CHAIN_MULT:0.15,                                // score = base*(1 + chain*mult)
    CHAIN_HOLD:3.2, CHAIN_HOLD_FLOOR:1.9,           // seconds before chain decays a step
    SCORE_BASE:100, CRIT_MULT:3, PURE_MULT:1.5,
    H_MAX:1.0, H_HIT:0.115, H_MISTAP:0.035,
    H_LOCK:0.022, H_REGEN:0.006,                    // per-event / per-second
  };
  var TONES = ["cyan","magenta","amber","violet"];

  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function lvlFloor(base,floor,step,level){ return Math.max(floor, base - step*(level-1)); }
  function levelThreshold(level){ return level*2200 + level*level*650; }
  function tonesForLevel(level){ return Math.min(4, 2 + Math.floor((level-1)/3)); }

  // Create a fresh game state. edgeR = playfield radius in px.
  function create(edgeR){
    return {
      edgeR: edgeR,
      nodeR: edgeR - CFG.RPAD,        // radius at which nodes live
      t:0,
      score:0,
      level:1,
      health:CFG.H_MAX,
      chain:0,
      chainTimer:0,
      ring:0,                          // current ring radius
      ringPrev:0,
      beatPhase:0,                     // 0..1 within current beat
      nodes:[],
      spawnTimer: 0.5,
      seed: 1234567,
      alive:true,
      stats:{perfect:0, good:0, pure:0, miss:0, decohered:0, maxChain:0, locks:0},
      // event log for the renderer to react to (consumed each frame)
      events:[],
    };
  }

  function rng(s){ s.seed = (s.seed*1103515245 + 12345) & 0x7fffffff; return s.seed/0x7fffffff; }

  function beatLen(s){ return lvlFloor(CFG.BEAT, CFG.BEAT_FLOOR, CFG.BEAT_STEP, s.level); }
  function windowPx(s){ return lvlFloor(CFG.WINDOW, CFG.WINDOW_FLOOR, CFG.WINDOW_STEP, s.level); }
  function nodeLife(s){ return lvlFloor(CFG.NODE_LIFE, CFG.NODE_LIFE_FLOOR, 0.42, s.level); }
  function spawnGap(s){ return lvlFloor(CFG.SPAWN, CFG.SPAWN_FLOOR, 0.16, s.level); }
  function chainHold(s){ return lvlFloor(CFG.CHAIN_HOLD, CFG.CHAIN_HOLD_FLOOR, 0.18, s.level); }

  function ringTone(s){
    // ring's current tone cycles each beat through available tones
    var n = tonesForLevel(s.level);
    var idx = Math.floor(s.t / beatLen(s)) % n;
    return TONES[idx];
  }

  function trySpawn(s){
    if(s.nodes.length >= CFG.MAX_NODES) return;
    var n = tonesForLevel(s.level);
    // place at an angle away from existing nodes for readability
    var ang, ok=false, tries=0;
    do{
      ang = rng(s)*Math.PI*2;
      ok = true;
      for(var i=0;i<s.nodes.length;i++){
        var d = Math.abs(((ang - s.nodes[i].ang + Math.PI)%(Math.PI*2)) - Math.PI);
        if(d < 0.9){ ok=false; break; }
      }
      tries++;
    } while(!ok && tries<8);
    s.nodes.push({
      ang: ang,
      tone: TONES[Math.floor(rng(s)*n)],
      life: nodeLife(s),
      maxLife: nodeLife(s),
      born: s.t,
      hit:false,
      // pop animation handled by renderer via events
    });
  }

  // advance simulation by dt seconds
  function step(s, dt){
    if(!s.alive) return;
    s.t += dt;
    s.events.length = 0;

    // --- ring travels center -> edge over one beat, then resets ---
    var bl = beatLen(s);
    s.beatPhase += dt / bl;
    var crossed = false;
    while(s.beatPhase >= 1){ s.beatPhase -= 1; crossed = true; }
    s.ringPrev = s.ring;
    s.ring = Math.max(0, s.beatPhase * s.edgeR);
    if(crossed){ s.events.push({type:"beat"}); }

    // --- chain decay ---
    if(s.chain > 0){
      s.chainTimer -= dt;
      if(s.chainTimer <= 0){
        s.chain = Math.max(0, s.chain - 1);
        s.chainTimer = chainHold(s);
        if(s.chain===0) s.events.push({type:"chainlost"});
      }
    }

    // --- nodes age / decohere ---
    for(var i=s.nodes.length-1;i>=0;i--){
      var nd = s.nodes[i];
      nd.life -= dt;
      if(nd.life <= 0){
        s.nodes.splice(i,1);
        s.stats.decohered++;
        s.chain = 0; s.chainTimer = 0;
        s.health = clamp(s.health - CFG.H_HIT, 0, CFG.H_MAX);
        s.events.push({type:"decohere", ang:nd.ang, tone:nd.tone});
        if(s.health<=0){ die(s); return; }
      }
    }

    // --- passive: tiny health drain so idling is fatal, small regen otherwise ---
    s.health = clamp(s.health + (CFG.H_REGEN - CFG.H_LOCK*0) * dt, 0, CFG.H_MAX);

    // --- spawn ---
    s.spawnTimer -= dt;
    if(s.spawnTimer <= 0){
      s.spawnTimer = spawnGap(s);
      trySpawn(s);
    }

    // --- level up by score ---
    while(s.score >= levelThreshold(s.level)){
      s.level++;
      s.events.push({type:"levelup", level:s.level});
    }
  }

  // How close (in px) is the ring to a node right now. lower = better.
  function nodeError(s, nd){ return Math.abs(s.ring - s.nodeR); }

  // Find the best resonating node for a Space press (closest to ideal, within window).
  function bestNode(s){
    var win = windowPx(s);
    var best=-1, bestErr=1e9;
    for(var i=0;i<s.nodes.length;i++){
      var e = nodeError(s, s.nodes[i]);
      if(e <= win && e < bestErr){ bestErr=e; best=i; }
    }
    return best;
  }

  // Resolve a hit on node index idx. Returns result object or null.
  function resolveHit(s, idx){
    var nd = s.nodes[idx];
    var win = windowPx(s);
    var err = nodeError(s, nd);
    if(err > win){
      // mistimed press on a node -> break chain, small penalty
      s.chain = 0; s.chainTimer = 0;
      s.health = clamp(s.health - CFG.H_MISTAP, 0, CFG.H_MAX);
      s.stats.miss++;
      s.events.push({type:"miss", ang:nd.ang});
      if(s.health<=0){ die(s); }
      return {result:"miss"};
    }
    // hit!
    var crit = err <= win*CFG.CRIT_FRAC;
    var pure = nd.tone === ringTone(s);
    var mult = 1;
    if(crit){ mult *= CFG.CRIT_MULT; s.stats.perfect++; }
    else { s.stats.good++; }
    if(pure){ mult *= CFG.PURE_MULT; s.stats.pure++; }

    var chainBonus = 1 + s.chain*CFG.CHAIN_MULT;
    var gained = Math.round(CFG.SCORE_BASE * mult * chainBonus);
    s.score += gained;
    s.chain++;
    s.chainTimer = chainHold(s);
    if(s.chain > s.stats.maxChain) s.stats.maxChain = s.chain;
    s.stats.locks++;
    s.health = clamp(s.health + CFG.H_LOCK, 0, CFG.H_MAX);

    s.nodes.splice(idx,1);
    s.events.push({type:"lock", ang:nd.ang, tone:nd.tone, crit:crit, pure:pure,
                   gained:gained, chain:s.chain});
    return {result: crit?"perfect":"good", pure:pure, gained:gained, chain:s.chain};
  }

  // Player pressed Space (auto-target). Returns result or null (empty press).
  function pressSpace(s){
    if(!s.alive) return null;
    var idx = bestNode(s);
    if(idx < 0){
      // space in empty space -> tiny penalty (anti-mash), softer than a real miss
      s.health = clamp(s.health - CFG.H_MISTAP*0.6, 0, CFG.H_MAX);
      if(s.chain >= 3){ s.chain = 0; s.chainTimer = 0; }
      s.events.push({type:"emptypress"});
      if(s.health<=0){ die(s); }
      return {result:"empty"};
    }
    return resolveHit(s, idx);
  }

  // Player tapped at screen angle `ang` (radians) within tap tolerance.
  // angTol in radians; if no node near that angle, it's an empty tap (no penalty).
  function pressAt(s, ang, angTol){
    if(!s.alive) return null;
    var best=-1, bestD=1e9;
    for(var i=0;i<s.nodes.length;i++){
      var d = Math.abs(((ang - s.nodes[i].ang + Math.PI)%(Math.PI*2)) - Math.PI);
      if(d < angTol && d < bestD){ bestD=d; best=i; }
    }
    if(best < 0){
      s.events.push({type:"emptytap"});   // clicking empty space is free
      return {result:"emptytap"};
    }
    return resolveHit(s, best);
  }

  function die(s){
    s.alive = false;
    s.events.push({type:"death"});
  }

  return {
    CFG:CFG, TONES:TONES,
    create:create, step:step, pressSpace:pressSpace, pressAt:pressAt,
    resolveHit:resolveHit, bestNode:bestNode, nodeError:nodeError,
    beatLen:beatLen, windowPx:windowPx, ringTone:ringTone,
    levelThreshold:levelThreshold, tonesForLevel:tonesForLevel,
    nodeLife:nodeLife, spawnGap:spawnGap, chainHold:chainHold,
    clamp:clamp,
  };
})();
if(typeof module!=="undefined" && module.exports){ module.exports = PhaseCore; }
</script>

<script>
/* ============================================================
   PHASE — renderer / audio / input  (the "juice" layer)
   ============================================================ */
(function(){
  if(typeof document==="undefined") return;  // headless guard
  var C = PhaseCore;

  var cv = document.getElementById("c");
  var ctx = cv.getContext("2d", {alpha:false});
  var DPR = Math.min(2, window.devicePixelRatio||1);
  var W=0,H=0, CX=0,CY=0, edgeR=0;

  var TONE_HEX = {cyan:"#39e6ff", magenta:"#ff4fd8", amber:"#ffc24b", violet:"#9b7bff"};
  var TONE_FREQ = {cyan:523.25, magenta:659.25, amber:783.99, violet:987.77}; // C5 E5 G5 B5

  function resize(){
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = W*DPR; cv.height = H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    CX = W/2; CY = H/2;
    edgeR = Math.min(W,H)*0.5 - 18;
    if(G){ G.edgeR = edgeR; G.nodeR = edgeR - C.CFG.RPAD; }
  }
  window.addEventListener("resize", resize);

  /* ---------- audio ---------- */
  var AC=null, master=null;
  function audioInit(){
    if(AC) return;
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value=0.32; master.connect(AC.destination);
    }catch(e){ AC=null; }
  }
  function tone(freq, dur, type, gain, when){
    if(!AC) return;
    var t = when||AC.currentTime;
    var o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain||0.3, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.18));
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+(dur||0.18)+0.02);
  }
  function chord(base, chainStep){
    if(!AC) return;
    var f = base * Math.pow(2, Math.min(chainStep,12)/12);  // rises with chain
    tone(f, 0.22, "triangle", 0.34);
    tone(f*1.5, 0.18, "sine", 0.16);
  }
  function thud(){ tone(70,0.16,"sine",0.4); }
  function tick(){ tone(180,0.05,"sine",0.05); }

  /* ---------- particles (capped, short) ---------- */
  var PCAP = 80;
  var parts = [];
  function burst(x,y,hex,n,spd,big){
    n = Math.min(n, PCAP - parts.length);
    for(var i=0;i<n;i++){
      var a = Math.random()*Math.PI*2, v = spd*(0.5+Math.random());
      parts.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
        life:1,decay:0.035+Math.random()*0.03,hex:hex,r:(big?2.2:1.3)+Math.random()*1.2});
    }
  }
  function updateParts(dt){
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94;
      p.life-=p.decay;
      if(p.life<=0) parts.splice(i,1);
    }
  }
  function drawParts(){
    ctx.globalCompositeOperation="lighter";
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.hex;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
  }

  // expanding shock ring on PERFECT only (one at a time-ish)
  var shocks=[];
  function shock(hex){ if(shocks.length<3) shocks.push({r:edgeR*0.4,a:0.8,hex:hex}); }

  /* ---------- screen kick ---------- */
  var kick=0;
  function addKick(v){ kick=Math.min(kick+v, 14); }

  /* ---------- toast (rare) ---------- */
  var toastEl=document.getElementById("toast");
  var toastT=0;
  function showToast(txt,hex){
    toastEl.textContent=txt;
    toastEl.style.color=hex||"#fff";
    toastEl.style.textShadow="0 0 40px "+(hex||"#fff");
    toastEl.style.transition="none";
    toastEl.style.opacity="1";
    toastEl.style.transform="translate(-50%,-50%) scale(1.12)";
    // force reflow then animate out
    void toastEl.offsetWidth;
    toastEl.style.transition="opacity .7s, transform .7s";
    toastEl.style.opacity="0";
    toastEl.style.transform="translate(-50%,-50%) scale(.85)";
  }

  /* ---------- HUD refs ---------- */
  var scoreEl=document.getElementById("score"),
      lvlEl=document.getElementById("lvl"),
      bestEl=document.getElementById("best"),
      chainWrap=document.getElementById("chainWrap"),
      chainNum=document.getElementById("chainNum"),
      chainBar=document.getElementById("chainBar"),
      hpFill=document.getElementById("hpFill"),
      howto=document.getElementById("howto");

  var scoreShown=0;

  /* ---------- game state ---------- */
  var G=null;
  var running=false, last=0, taught=false;
  var BEST = +(localStorage.getItem("phase6_best")||0);
  var RUNS = +(localStorage.getItem("phase6_runs")||0);
  taught = localStorage.getItem("phase6_taught")==="1";
  bestEl.textContent = BEST;

  // tutorial overlay state (lightweight, drawn on canvas)
  var tut={on:false, step:0, hold:0};

  function startGame(withTutorial){
    audioInit();
    if(AC && AC.state==="suspended") AC.resume();
    resize();
    G = C.create(edgeR);
    G.nodeR = edgeR - C.CFG.RPAD;
    parts.length=0; shocks.length=0; kick=0; scoreShown=0;
    tut.on = withTutorial && !taught;
    tut.step=0; tut.hold=0;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("endScreen").classList.add("hidden");
    chainWrap.style.opacity="0";
    howto.style.opacity="1";
    running=true; last=performance.now();
    requestAnimationFrame(loop);
  }

  function endGame(){
    running=false;
    RUNS++; localStorage.setItem("phase6_runs", RUNS);
    var rec = G.score > BEST;
    if(rec){ BEST=G.score; localStorage.setItem("phase6_best", BEST); }
    bestEl.textContent = BEST;

    var verdict = document.getElementById("endVerdict"),
        es = document.getElementById("endScore"),
        el = document.getElementById("endLine"),
        md = document.getElementById("medal");

    var st = G.stats;
    // medal by performance
    var acc = st.locks / Math.max(1, st.locks+st.miss+st.decohered);
    var medal = "✦";
    if(rec) medal="◈";
    else if(G.level>=6 || acc>0.85) medal="◆";
    else if(G.level>=3) medal="◇";
    md.textContent = medal;

    if(rec){
      verdict.textContent="RESONANCE";
      verdict.style.color="#39e6ff";
      verdict.style.textShadow="0 0 40px rgba(57,230,255,.6)";
      showToast("",""); // clear
      // celebratory chord + confetti
      audioInit();
      if(AC){ chord(523.25,0); chord(659.25,4); chord(783.99,7); }
      for(var i=0;i<4;i++) setTimeout(function(){
        burst(CX,CY,["#39e6ff","#ff4fd8","#ffc24b","#9b7bff"][Math.floor(Math.random()*4)],18,9,true);
      }, i*90);
    } else {
      verdict.textContent="DECOHERED";
      verdict.style.color="#ff4fd8";
      verdict.style.textShadow="0 0 30px rgba(255,79,216,.4)";
    }
    es.textContent = G.score;
    el.textContent = "LEVEL "+G.level+"  ·  ЦЕПЬ ×"+st.maxChain+"  ·  PERFECT "+st.perfect;

    // run a couple particle frames so confetti shows on the static end screen
    var fr=0;
    (function tail(){
      if(fr++>90) return;
      ctx.fillStyle="rgba(4,6,12,0.28)"; ctx.fillRect(0,0,W,H);
      updateParts(1); drawParts();
      requestAnimationFrame(tail);
    })();

    setTimeout(function(){
      document.getElementById("endScreen").classList.remove("hidden");
    }, rec?700:350);
  }

  /* ---------- event consumption (juice) ---------- */
  function consumeEvents(){
    for(var i=0;i<G.events.length;i++){
      var e=G.events[i];
      var pos;
      if(e.ang!==undefined){ pos={x:CX+Math.cos(e.ang)*G.nodeR, y:CY+Math.sin(e.ang)*G.nodeR}; }
      if(e.type==="beat"){ tick(); }
      else if(e.type==="lock"){
        var hex=TONE_HEX[e.tone];
        if(e.crit){
          burst(pos.x,pos.y,hex,16,7,true);
          burst(CX,CY,hex,8,5,false);
          shock(hex); addKick(9); chord(TONE_FREQ[e.tone], e.chain);
          if(e.chain>=5 && e.chain%5===0) showToast("×"+e.chain, hex);
          else showToast("PERFECT", hex);
        } else {
          burst(pos.x,pos.y,hex,9,5,false);
          addKick(4); tone(TONE_FREQ[e.tone], 0.16, e.pure?"triangle":"sine", 0.26);
        }
      }
      else if(e.type==="miss" || e.type==="emptypress"){ addKick(3); tone(120,0.12,"sawtooth",0.12); }
      else if(e.type==="decohere"){
        if(pos) burst(pos.x,pos.y,"#ff4fd8",10,4,false);
        addKick(6); thud();
      }
      else if(e.type==="levelup"){
        showToast("LEVEL "+e.level, "#9b7bff");
        if(AC){ tone(659.25,0.18,"triangle",0.3); tone(987.77,0.22,"sine",0.18); }
      }
      else if(e.type==="death"){ /* handled by loop */ }
    }
  }

  /* ---------- drawing ---------- */
  function draw(){
    // trail-fade background (cheap motion blur, dark) — kept subtle so the
    // ring reads as ONE crisp line, not a stacked band (anti-cacophony)
    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="rgba(4,6,12,0.55)";
    ctx.fillRect(0,0,W,H);

    var kx = kick? (Math.random()*2-1)*kick : 0;
    var ky = kick? (Math.random()*2-1)*kick : 0;
    kick *= 0.82; if(kick<0.4) kick=0;
    ctx.save();
    ctx.translate(kx,ky);

    var win = C.windowPx(G);
    var rtone = C.ringTone(G);
    var rhex = TONE_HEX[rtone];

    // faint guide circle where nodes live
    ctx.globalCompositeOperation="lighter";
    ctx.beginPath(); ctx.arc(CX,CY,G.nodeR,0,7);
    ctx.strokeStyle="rgba(90,116,148,0.10)"; ctx.lineWidth=1; ctx.stroke();

    // center core (pulses on beat)
    var pulse = 1 - G.beatPhase;
    var coreR = 6 + pulse*5;
    ctx.beginPath(); ctx.arc(CX,CY,coreR,0,7);
    ctx.fillStyle=rhex; ctx.globalAlpha=0.5+pulse*0.4;
    ctx.shadowBlur=24; ctx.shadowColor=rhex; ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // ---- the ONE ring ----
    var rr = Math.max(0, G.ring);
    // ring intensifies as it approaches the node-orbit (where hits happen)
    var nearOrbit = 1 - Math.min(1, Math.abs(rr - G.nodeR) / (G.edgeR*0.5));
    ctx.beginPath(); ctx.arc(CX,CY,rr,0,7);
    ctx.strokeStyle=rhex; ctx.globalAlpha=0.55 + nearOrbit*0.4;
    ctx.lineWidth=2 + nearOrbit*1.5; ctx.shadowBlur=10 + nearOrbit*16; ctx.shadowColor=rhex;
    ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // shock rings (perfect)
    for(var s=shocks.length-1;s>=0;s--){
      var sh=shocks[s];
      sh.r+=8; sh.a-=0.04;
      if(sh.a<=0){ shocks.splice(s,1); continue; }
      ctx.beginPath(); ctx.arc(CX,CY,sh.r,0,7);
      ctx.strokeStyle=sh.hex; ctx.globalAlpha=sh.a; ctx.lineWidth=2; ctx.stroke();
      ctx.globalAlpha=1;
    }

    // ---- nodes ----
    for(var i=0;i<G.nodes.length;i++){
      var nd=G.nodes[i];
      var x=CX+Math.cos(nd.ang)*G.nodeR, y=CY+Math.sin(nd.ang)*G.nodeR;
      var hex=TONE_HEX[nd.tone];
      var err=C.nodeError(G, nd);
      var inWin = err<=win;
      var prox = inWin ? 1-(err/win) : 0;            // 0..1 how "ripe"
      var crit = err<=win*C.CFG.CRIT_FRAC;
      var lifeFrac = nd.life/nd.maxLife;
      var pure = nd.tone === rtone;
      ctx.globalCompositeOperation="lighter";

      // decoherence countdown: a thin ring that empties as the node ages.
      // Stays quiet so idle nodes don't add noise; reddens when about to die.
      if(lifeFrac < 0.45){
        ctx.beginPath();
        ctx.arc(x,y,C.CFG.NODE_R+8,-Math.PI/2,-Math.PI/2+lifeFrac/0.45*Math.PI*2);
        ctx.strokeStyle="#ff4fd8"; ctx.globalAlpha=0.55*(1-lifeFrac/0.45);
        ctx.lineWidth=2; ctx.stroke(); ctx.globalAlpha=1;
      }

      // CONVERGING APERTURE: a ring that races in from outside and snaps onto the
      // dot exactly at the perfect instant. This is the "NOW" signal.
      if(prox>0){
        var apR = C.CFG.NODE_R + (1-prox)*30;
        ctx.beginPath(); ctx.arc(x,y,apR, 0,7);
        ctx.strokeStyle = crit ? "#ffffff" : hex;
        ctx.globalAlpha = 0.3 + 0.7*prox;
        ctx.lineWidth = 1.5 + prox*2.5;
        ctx.shadowBlur = prox*26; ctx.shadowColor = crit?"#ffffff":hex;
        ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1;
        // PURE hint: a second faint concentric ring when tone matches the sweep
        if(pure && prox>0.3){
          ctx.beginPath(); ctx.arc(x,y,apR+6,0,7);
          ctx.strokeStyle=hex; ctx.globalAlpha=0.35*prox; ctx.lineWidth=1; ctx.stroke();
          ctx.globalAlpha=1;
        }
      }

      // core dot — dim while waiting, blooms as the ring arrives
      var dotR = C.CFG.NODE_R*(0.5 + prox*0.55);
      ctx.beginPath(); ctx.arc(x,y,dotR,0,7);
      ctx.fillStyle = hex;
      ctx.globalAlpha = 0.4 + prox*0.6;
      ctx.shadowBlur = 6 + prox*24; ctx.shadowColor = hex; ctx.fill();
      ctx.shadowBlur=0; ctx.globalAlpha=1;

      // crit flash: dot core goes white-hot at the perfect instant
      if(crit){
        ctx.beginPath(); ctx.arc(x,y,dotR*0.55,0,7);
        ctx.fillStyle="#ffffff"; ctx.globalAlpha=0.95;
        ctx.shadowBlur=18; ctx.shadowColor="#fff"; ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1;
      }
    }

    ctx.globalCompositeOperation="lighter";
    drawParts();
    ctx.restore();
    ctx.globalCompositeOperation="source-over";
  }

  /* ---------- tutorial (drawn overlay, 3 quick beats) ---------- */
  function drawTutorial(){
    if(!tut.on) return;
    // dim hint text near center top
    ctx.save();
    ctx.globalCompositeOperation="source-over";
    ctx.textAlign="center"; ctx.fillStyle="rgba(159,194,230,0.92)";
    ctx.font="600 18px Segoe UI, sans-serif";
    var msg = tut.step===0 ? "Кольцо расходится из центра…"
            : tut.step===1 ? "Точка загорается, когда кольцо близко"
            : "ЖМИ Space или по точке в этот миг →";
    ctx.fillText(msg, CX, CY - edgeR*0.55);
    ctx.font="13px Segoe UI, sans-serif"; ctx.fillStyle="rgba(90,116,148,0.8)";
    ctx.fillText("(нажми что угодно, чтобы продолжить)", CX, CY - edgeR*0.55 + 26);
    ctx.restore();
  }

  /* ---------- main loop ---------- */
  function loop(now){
    if(!running) return;
    var dt = Math.max(0, Math.min(0.05, (now-last)/1000)); last=now;

    if(tut.on){
      // tutorial: ring runs but no death, no spawn pressure; advance on input
      C.step(G, dt);
      // keep health pinned, keep exactly 1 node alive for demo
      G.health = C.CFG.H_MAX;
      if(G.nodes.length===0) { G.spawnTimer=0; }
      consumeEvents();
      draw();
      drawTutorial();
      // update minimal HUD
      hpFill.style.transform="scaleX(1)";
      requestAnimationFrame(loop);
      return;
    }

    C.step(G, dt);
    consumeEvents();
    draw();

    // HUD
    scoreShown += (G.score-scoreShown)*0.25;
    if(Math.abs(G.score-scoreShown)<1) scoreShown=G.score;
    scoreEl.textContent = Math.round(scoreShown);
    lvlEl.textContent = "LEVEL "+G.level;
    hpFill.style.transform = "scaleX("+G.health+")";
    if(G.health<0.3){ hpFill.style.background="var(--magenta)"; }
    else hpFill.style.background="linear-gradient(90deg,var(--magenta),var(--cyan))";

    if(G.chain>=2){
      chainWrap.style.opacity="1";
      chainNum.textContent="×"+(1+ (G.chain*C.CFG.CHAIN_MULT)).toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
      chainNum.textContent="×"+G.chain;
      var frac = G.chainTimer / C.chainHold(G);
      chainBar.style.transform="scaleX("+Math.max(0.04,frac)+")";
    } else {
      chainWrap.style.opacity="0";
    }
    if(G.score>50) howto.style.opacity="0";

    if(!G.alive){ endGame(); return; }
    requestAnimationFrame(loop);
  }

  /* ---------- input ---------- */
  function handlePress(clientX, clientY){
    if(!running || !G) return;
    if(tut.on){
      tut.step++;
      if(tut.step>=3){
        tut.on=false; taught=true; localStorage.setItem("phase6_taught","1");
        howto.style.opacity="1";
        G.spawnTimer=0.3;
      } else {
        // ensure a demo node exists for next step
        if(G.nodes.length===0){ G.spawnTimer=0; }
      }
      return;
    }
    if(clientX==null){ // Space
      C.pressSpace(G);
    } else {
      var rect = cv.getBoundingClientRect();
      var dx = (clientX-rect.left) - CX, dy=(clientY-rect.top) - CY;
      var ang = Math.atan2(dy,dx);
      var r = Math.hypot(dx,dy);
      // tap tolerance widens for nodes; if click is way off the node ring, treat as space-like
      C.pressAt(G, ang, 0.55);
    }
    consumeEvents();
  }

  window.addEventListener("keydown", function(e){
    if(e.code==="Space" || e.code==="Enter"){
      e.preventDefault();
      if(!running && !document.getElementById("startScreen").classList.contains("hidden")){
        startGame(true); return;
      }
      if(!running && !document.getElementById("endScreen").classList.contains("hidden")){
        startGame(false); return;
      }
      handlePress(null,null);
    }
  });
  cv.addEventListener("pointerdown", function(e){
    e.preventDefault();
    handlePress(e.clientX, e.clientY);
  });

  document.getElementById("startBtn").addEventListener("click", function(){ startGame(true); });
  document.getElementById("skipBtn").addEventListener("click", function(){
    taught=true; localStorage.setItem("phase6_taught","1"); startGame(false);
  });
  document.getElementById("againBtn").addEventListener("click", function(){ startGame(false); });

  // boot
  resize();
  // ambient idle render on start screen
  (function idle(){
    if(running) return;
    ctx.fillStyle="rgba(4,6,12,0.2)"; ctx.fillRect(0,0,W,H);
    var t=performance.now()/1000;
    ctx.globalCompositeOperation="lighter";
    var rr=(t%1.4)/1.4*edgeR;
    ctx.beginPath(); ctx.arc(CX,CY,rr,0,7);
    ctx.strokeStyle="rgba(57,230,255,0.18)"; ctx.lineWidth=2; ctx.stroke();
    ctx.globalCompositeOperation="source-over";
    requestAnimationFrame(idle);
  })();

  // expose for tests
  window.__PHASE__ = {get G(){return G;}, start:startGame, core:C};
})();
</script>
</body>
